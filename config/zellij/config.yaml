---
keybinds:
    normal:
        - unbind: true
        - action: [ NewPane: Right, ]
          key: [ Alt: ']',]
        - action: [ NewPane: Down, ]
          key: [ Alt: '[',]
        - action: [ NewPane: , ]
          key: [ Alt: 'n',]
        - action: [ NewTab: ,]
          key: [ Ctrl: 'n', ]
        - action: [MoveFocusOrTab: Left,]
          key: [ Ctrl: 'k', ]
        - action: [MoveFocusOrTab: Right,]
          key: [ Ctrl: 'o',]
themes:
    default:
        fg: [216,222,233]
        bg: [46,52,64]
        black: [59,66,82]
        gray: [59,66,82]
        red: [191,97,106]
        green: [163,190,140]
        yellow: [235,203,139]
        blue: [129,161,193]
        magenta: [180,142,173]
        cyan: [136,192,208]
        white: [229,233,240]
        orange: [0,0,0]
